name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  boot-smoke:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils

      - name: Prepare alpine-ci profile
        run: ./bin/vmctl prep alpine-ci

      - name: Boot smoke test
        run: ./bin/vmctl boot-check alpine-ci

  ubuntu-niri-dry-run:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dry-run host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso genisoimage

      - name: Prepare ubuntu-niri unattended install dry-run
        run: ./bin/vmctl --dry-run install-unattended ubuntu-niri

      - name: Prepare ubuntu-niri post-install dry-run
        run: ./bin/vmctl --dry-run post-install ubuntu-niri

  ubuntu-server-headless-install-boot:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install CI host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso genisoimage ovmf

      - name: Bootstrap ubuntu-server-headless
        run: ./bin/vmctl bootstrap-unattended ubuntu-server-headless --timeout 2400

      - name: Stop installed ubuntu-server-headless background VM
        run: ./bin/vmctl stop ubuntu-server-headless

      - name: Boot ubuntu-server-headless from disk
        run: ./bin/vmctl boot-check ubuntu-server-headless

  debian-server-dry-run:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dry-run host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso genisoimage

      - name: Prepare debian-server unattended install dry-run
        run: ./bin/vmctl --dry-run bootstrap-preseed debian-server

  almalinux-server-dry-run:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dry-run host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils xorriso genisoimage

      - name: Prepare almalinux-server unattended install dry-run
        run: ./bin/vmctl --dry-run bootstrap-kickstart almalinux-server
